services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  app:
    build: .
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379

volumes:
  redis-data:
